name: 股票公告监控

on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分钟运行一次，24小时不间断
  workflow_dispatch:         # 允许手动触发（测试用）

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install requests   # 只需要 requests，不再需要 tushare

      - name: 执行公告检查
        env:
          SENDKEY:      ${{ secrets.SENDKEY }}
          SENDKEY2:     ${{ secrets.SENDKEY2 }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPO:  panxiaochen001/Stock_monitor_01
        run: python checker.py
