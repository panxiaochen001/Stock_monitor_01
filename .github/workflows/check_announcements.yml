name: 股票公告监控

on:
  schedule:
    # 每15分钟执行一次（UTC时间，北京时间=UTC+8）
    # 交易时间段加密检查：北京时间 9:00-18:00 = UTC 1:00-10:00
    - cron: '*/15 1-10 * * 1-5'   # 周一到周五 交易时段每15分钟
    - cron: '0 11-23 * * 1-5'     # 周一到周五 盘后每小时一次（检查盘后公告）
    - cron: '0 18 * * 6,0'        # 周末每天18:00检查一次
  workflow_dispatch:               # 允许手动触发（测试用）

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install tushare requests

      - name: 执行公告检查
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          SENDKEY:       ${{ secrets.SENDKEY }}
          SENDKEY2:      ${{ secrets.SENDKEY2 }}
          GITHUB_TOKEN:  ${{ secrets.GH_TOKEN }}
          GITHUB_REPO:   panxiaochen001/Stock_monitor_01
        run: python checker.py
